name: Fetch Weather Data (CWA)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run fetch script
        env:
          CWA_KEY: ${{ secrets.CWA_API_KEY }}
        run: python3 fetch_weather.py

      - name: Commit and push
        run: |
          git config user.name "weather-bot"
          git config user.email "weather-bot@users.noreply.github.com"
          git add weather-data.json
          git diff --staged --quiet || (git commit -m "自動更新天氣資料 $(date '+%Y-%m-%d %H:%M')" && git push)
